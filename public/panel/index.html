<script>
// ═══════════════════════════════════════════════════════════════
// Configuration & Utilities
// ═══════════════════════════════════════════════════════════════

const API_BASE = ''; // same-origin (backend serves both /panel and /admin API)
const LS_ACCESS = 'panel_access';
const LS_REFRESH = 'panel_refresh';
const LS_USER = 'panel_user';

// Turkish phone → +90XXXXXXXXXX
function normalizeTRPhone(input) {
  let s = String(input || '').replace(/[^\d+]/g, '');
  if (s.startsWith('+90')) return s;
  if (s.startsWith('90') && s.length >= 12) return '+' + s;
  if (s.startsWith('0') && s.length === 11) return '+90' + s.slice(1);
  if (s.length === 10) return '+90' + s;
  return null;
}

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// API wrapper — auto refresh on 401
async function api(path, options = {}) {
  const access = localStorage.getItem(LS_ACCESS);
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (access) headers.Authorization = 'Bearer ' + access;
  let res = await fetch(API_BASE + path, { ...options, headers });

  if (res.status === 401) {
    const refresh = localStorage.getItem(LS_REFRESH);
    if (refresh) {
      const rr = await fetch(API_BASE + '/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh }),
      });
      if (rr.ok) {
        const data = await rr.json();
        localStorage.setItem(LS_ACCESS, data.access);
        headers.Authorization = 'Bearer ' + data.access;
        res = await fetch(API_BASE + path, { ...options, headers });
      } else {
        logout();
        return null;
      }
    } else {
      logout();
      return null;
    }
  }

  if (res.status === 403) {
    const body = await res.json().catch(() => ({}));
    if (body.error === 'user_banned' || body.error === 'admin_required') {
      logout();
      return null;
    }
  }

  return res;
}

async function apiJson(path, options) {
  const res = await api(path, options);
  if (!res) return null;
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || body.error || 'API error ' + res.status);
  }
  return await res.json();
}

// ═══════════════════════════════════════════════════════════════
// Auth
// ═══════════════════════════════════════════════════════════════

function showLogin() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('login-view').classList.add('flex');
}

function showMain() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('flex');
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('main-view').classList.add('flex');
  const user = JSON.parse(localStorage.getItem(LS_USER) || 'null');
  if (user) {
    document.getElementById('user-info').textContent = user.display_name || user.id;
  }
  switchTab('dashboard');
}

function logout() {
  localStorage.removeItem(LS_ACCESS);
  localStorage.removeItem(LS_REFRESH);
  localStorage.removeItem(LS_USER);
  showLogin();
}

// Panel login — TOTP zorunlu. Setup akışı UI'den kaldırıldı.
// Yeni admin kurulumu server yöneticisi tarafından CLI ile yapılır.
async function doLogin(phoneInput, pin, totp) {
  const phone = normalizeTRPhone(phoneInput);
  if (!phone) throw new Error('Geçersiz telefon numarası — TR formatında gir');
  if (!totp || !/^\d{6}$/.test(totp)) throw new Error('6 haneli doğrulama kodunu gir.');
  const phoneSha256 = await sha256Hex(phone);

  const res = await fetch(API_BASE + '/auth/panel/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, phoneSha256, pin, totp }),
  });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    if (data.error === 'totp_not_configured') {
      throw new Error('Panel erişimi hazır değil. Sistem yöneticisine bildir.');
    }
    throw new Error(data.message || data.error || 'Giriş başarısız');
  }

  localStorage.setItem(LS_ACCESS, data.tokens.access);
  localStorage.setItem(LS_REFRESH, data.tokens.refresh);
  localStorage.setItem(LS_USER, JSON.stringify(data.user));
}

// ═══════════════════════════════════════════════════════════════
// Tabs
// ═══════════════════════════════════════════════════════════════

let currentTab = 'dashboard';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) {
      b.classList.add('bg-slate-800');
    } else {
      b.classList.remove('bg-slate-800');
    }
  });
  const titles = {
    dashboard: 'Dashboard',
    users: 'Kullanıcı Yönetimi',
    listings: 'İlan Moderasyonu',
    reports: 'Şikayetler',
    banned: 'Yasak Kelimeler',
  };
  document.getElementById('page-title').textContent = titles[tab] || '';
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'users') renderUsers();
  if (tab === 'listings') renderListings();
  if (tab === 'reports') renderReports();
  if (tab === 'banned') renderBanned();
}

// ═══════════════════════════════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════════════════════════════

function delta(today, yesterday) {
  if (yesterday === 0 && today === 0) return { text: '—', color: 'text-slate-500' };
  if (yesterday === 0) return { text: '+' + today, color: 'text-green-600' };
  const pct = Math.round(((today - yesterday) / yesterday) * 100);
  if (pct > 0) return { text: '↑ %' + pct, color: 'text-green-600' };
  if (pct < 0) return { text: '↓ %' + Math.abs(pct), color: 'text-red-600' };
  return { text: '=', color: 'text-slate-500' };
}

function metricCard(icon, label, value, sub, borderColor) {
  const subEl = sub ? `<div class="text-xs mt-1 ${sub.color || 'text-slate-500'} font-semibold">${sub.text}</div>` : '';
  return `
    <div class="card card-lg" style="border-left-color: ${borderColor};">
      <div class="flex items-center gap-2 text-xs text-slate-500 font-semibold uppercase tracking-wide">
        <span>${icon}</span> ${label}
      </div>
      <div class="text-3xl font-extrabold mt-2">${(value ?? 0).toLocaleString('tr-TR')}</div>
      ${subEl}
    </div>`;
}

// Rehber sağlığı için özel kart — % yüzde + tıklanabilir filtre
function lowContactsCard(icon, label, value, total, borderColor, quickFilter) {
  const pct = total > 0 ? Math.round((value / total) * 100) : 0;
  const clickable = !!quickFilter;
  return `
    <div class="card card-lg ${clickable ? 'cursor-pointer hover:bg-slate-50' : ''}"
         style="border-left-color: ${borderColor};"
         ${clickable ? `data-quick-filter="${quickFilter}"` : ''}>
      <div class="flex items-center gap-2 text-xs text-slate-500 font-semibold uppercase tracking-wide">
        <span>${icon}</span> ${label}
      </div>
      <div class="flex items-baseline gap-2 mt-2">
        <div class="text-3xl font-extrabold">${(value ?? 0).toLocaleString('tr-TR')}</div>
        <div class="text-sm text-slate-500">%${pct}</div>
      </div>
      ${clickable ? '<div class="text-xs text-blue-600 mt-1">→ Listeye git</div>' : ''}
    </div>`;
}

async function renderDashboard() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="flex items-center justify-center py-16"><div class="spinner"></div></div>';
  try {
    const [d, sms] = await Promise.all([
      apiJson('/admin/dashboard'),
      apiJson('/admin/sms-balance').catch(() => null),
    ]);
    updateReportsBadge(d.reports_pending);

    const signupD = delta(d.signup_today, d.signup_yesterday);
    const listingD = delta(d.listings_today, d.listings_yesterday);
    const msgD = delta(d.messages_today, d.messages_yesterday);

    let smsHtml = '';
    if (sms && (sms.twilio || sms.netgsm)) {
      const boxes = [];
      if (sms.twilio?.ok) {
        const low = sms.twilio.balance < 5;
        boxes.push(`<div class="flex items-center gap-2 bg-white border rounded-lg px-3 py-2 ${low ? 'border-red-300' : 'border-yellow-200'}">
          <span>💵</span><span class="text-xs text-slate-500">Twilio</span>
          <span class="font-bold ${low ? 'text-red-600' : ''}">$${sms.twilio.balance.toFixed(2)}</span>
        </div>`);
      }
      if (sms.netgsm?.ok) {
        const low = sms.netgsm.balance < 100;
        boxes.push(`<div class="flex items-center gap-2 bg-white border rounded-lg px-3 py-2 ${low ? 'border-red-300' : 'border-yellow-200'}">
          <span>💬</span><span class="text-xs text-slate-500">NetGSM</span>
          <span class="font-bold ${low ? 'text-red-600' : ''}">${sms.netgsm.balance.toFixed(0)} kredi</span>
        </div>`);
      }
      if (sms.twilio && !sms.twilio.ok) boxes.push(`<div class="flex items-center gap-2 bg-red-50 border border-red-300 rounded-lg px-3 py-2 text-red-700"><span>⚠️</span>Twilio hata</div>`);
      if (sms.netgsm && !sms.netgsm.ok) boxes.push(`<div class="flex items-center gap-2 bg-red-50 border border-red-300 rounded-lg px-3 py-2 text-red-700"><span>⚠️</span>NetGSM hata</div>`);
      smsHtml = `<div class="mb-6 flex flex-wrap gap-2">${boxes.join('')}</div>`;
    }

    c.innerHTML = `
      ${smsHtml}
      <div class="mb-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Bugün</div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${metricCard('👤', 'Kayıt', d.signup_today, { text: 'Dün: ' + d.signup_yesterday + ' · ' + signupD.text, color: signupD.color }, '#16a34a')}
        ${metricCard('📦', 'Yeni İlan', d.listings_today, { text: 'Dün: ' + d.listings_yesterday + ' · ' + listingD.text, color: listingD.color }, '#1F4E79')}
        ${metricCard('💬', 'Mesaj', d.messages_today, { text: 'Dün: ' + d.messages_yesterday + ' · ' + msgD.text, color: msgD.color }, '#7c3aed')}
        ${metricCard('⚠️', 'Bekleyen Şikayet', d.reports_pending, { text: 'Bugün: ' + d.reports_today + ' yeni', color: 'text-slate-500' }, d.reports_pending > 0 ? '#dc2626' : '#94a3b8')}
      </div>

      <div class="mb-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Aktif Kullanıcı</div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${metricCard('⚡', 'Son 24 saat (DAU)', d.dau, null, '#f59e0b')}
        ${metricCard('📅', 'Son 7 gün (WAU)', d.wau, null, '#0ea5e9')}
        ${metricCard('📈', 'Son 30 gün (MAU)', d.mau, null, '#8b5cf6')}
        ${metricCard('💭', 'Toplam Sohbet', d.conversations_total, null, '#0891b2')}
      </div>

      <div class="mb-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Kullanıcı Havuzu</div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${metricCard('👥', 'Toplam', d.users_total, null, '#1F4E79')}
        ${metricCard('✅', 'Aktif', d.users_active, null, '#16a34a')}
        ${metricCard('⏸️', 'Askıda', d.users_suspended, null, '#f59e0b')}
        ${metricCard('🚫', 'Yasaklı', d.users_banned, null, '#dc2626')}
      </div>

      <div class="mb-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Dağılım</div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${metricCard('♀️', 'Kadın', d.users_female, null, '#ec4899')}
        ${metricCard('♂️', 'Erkek', d.users_male, null, '#2563eb')}
        ${metricCard('🟢', 'Aktif İlan', d.listings_active, null, '#16a34a')}
        ${metricCard('📚', 'Toplam İlan', d.listings_total, null, '#64748b')}
      </div>

      <div class="mb-2 flex items-center gap-2">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Rehber Sağlığı</span>
        <span class="text-xs text-slate-400 italic">(network effect göstergesi)</span>
      </div>
      <div class="grid grid-cols-4 gap-4 mb-4">
        ${metricCard('📇', 'Ortalama Rehber', d.avg_contacts, {
          text: 'Medyan: ' + (d.median_contacts ?? 0),
          color: 'text-slate-500',
        }, '#0891b2')}
        ${lowContactsCard('❗', 'Boş Rehber (0)', d.users_no_contacts, d.users_total, '#dc2626', 'low_contacts')}
        ${lowContactsCard('⚠️', 'Az Rehber (1-4)', d.users_low_contacts, d.users_total, '#f59e0b', 'low_contacts')}
        ${lowContactsCard('✅', 'Sağlıklı (20+)', d.users_healthy_contacts, d.users_total, '#16a34a', null)}
      </div>

      <div class="mb-2 flex items-center gap-2">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Potansiyel Havuz</span>
        <span class="text-xs text-slate-400 italic">(rehberlerdeki mükerrer olmayan farklı telefonlar)</span>
      </div>
      <div class="grid grid-cols-3 gap-4">
        ${metricCard('🌐', 'Toplam Potansiyel', d.unique_contacts_pool, {
          text: 'Rehberlerdeki farklı telefon',
          color: 'text-slate-500',
        }, '#8b5cf6')}
        ${metricCard('✅', 'Zaten Kayıtlı', d.pool_registered, {
          text: d.unique_contacts_pool > 0
            ? '%' + Math.round((d.pool_registered / d.unique_contacts_pool) * 100) + ' — mevcut kullanıcı'
            : '',
          color: 'text-green-600',
        }, '#16a34a')}
        ${metricCard('🎯', 'Çekilecek', d.pool_unregistered, {
          text: d.unique_contacts_pool > 0
            ? '%' + Math.round((d.pool_unregistered / d.unique_contacts_pool) * 100) + ' — kayıtsız hedef'
            : '',
          color: 'text-blue-600',
        }, '#0ea5e9')}
      </div>
    `;
    // "Az rehberli" kartlarına click handler ekle → Kullanıcılar sekmesine göndersin
    c.querySelectorAll('[data-quick-filter]').forEach(el => {
      el.addEventListener('click', () => {
        usersState = { q: '', status: 'all', sortBy: 'low_contacts' };
        switchTab('users');
      });
    });
    document.getElementById('last-updated').textContent = 'Güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
  } catch (err) {
    c.innerHTML = '<div class="text-red-600 bg-red-50 border border-red-200 rounded-lg p-4">Yüklenemedi: ' + err.message + '</div>';
  }
}

function updateReportsBadge(n) {
  const el = document.getElementById('reports-badge');
  if (n > 0) {
    el.textContent = n;
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

let usersState = { q: '', status: 'all', sortBy: 'recent' };
let selectedUserIds = new Set(); // Toplu mesaj için seçili kullanıcılar
let currentUsersList = []; // Son yüklenen liste (seç/hepsini seç için)

const BROADCAST_PRESET = {

      loadUsers();
    }, 300);

      usersView();

    b.addEventListener('click', () => {

    });

async function loadUsers() {
  const list = document.getElementById('users-list');
  try {
    const params = new URLSearchParams({ limit: '80' });
    if (usersState.q) params.set('q', usersState.q);
    if (usersState.status !== 'all') params.set('status', usersState.status);
    if (usersState.sortBy && usersState.sortBy !== 'recent') params.set('sortBy', usersState.sortBy);
    const data = await apiJson('/admin/users?' + params.toString());
    const users = data?.users || [];
    currentUsersList = users;
    if (users.length === 0) {
      list.innerHTML = '<div class="p-12 text-center text-slate-400">Sonuç yok</div>';
      return;
    }
    list.innerHTML = users.map(u => userRow(u)).join('');
    // Detay tıklaması — avatar/isim alanı
    list.querySelectorAll('[data-user-id]').forEach(el => {
      el.addEventListener('click', () => openUserDetail(el.dataset.userId));
    });
    // Checkbox — event bubble sırasında row'un click'ini iptal etmek için stopPropagation
    list.querySelectorAll('[data-select-user]').forEach(el => {
      el.addEventListener('click', (e) => e.stopPropagation());
      el.addEventListener('change', (e) => {
        const uid = e.target.dataset.selectUser;
        if (e.target.checked) selectedUserIds.add(uid);
        else selectedUserIds.delete(uid);
        updateBulkToolbar();
      });
    });
    updateBulkToolbar();

    // Toolbar butonları
    const selAll = document.getElementById('select-all-visible');
    if (selAll) selAll.onclick = () => {
      users.forEach(u => selectedUserIds.add(u.id));
      loadUsers();
    };
    const clr = document.getElementById('clear-selection');
    if (clr) clr.onclick = () => {
      selectedUserIds.clear();
      loadUsers();
    };
    const bcast = document.getElementById('broadcast-btn');
    if (bcast) bcast.onclick = () => openBroadcastModal();
  } catch (err) {
    list.innerHTML = '<div class="p-6 text-red-600">Hata: ' + err.message + '</div>';
  }
}

function statusBadge(s) {
  if (s === 'active') return '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-800 font-semibold">Aktif</span>';
  if (s === 'suspended') return '<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 font-semibold">Askıda</span>';
  return '<span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-800 font-semibold">Yasaklı</span>';
}

function formatDateShort(iso) {
  if (!iso) return 'hiç';
  const d = new Date(iso);
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days === 0) return 'bugün';
  if (days === 1) return 'dün';
  if (days < 7) return days + ' gün önce';
  return d.toLocaleDateString('tr-TR');
}

function contactBadge(n) {
  if (n == null) return '';
  if (n === 0) return '<span class="text-red-600 font-bold">📇 0 (boş)</span>';
  if (n < 5) return '<span class="text-orange-600 font-bold">📇 ' + n + '</span>';
  if (n < 20) return '<span class="text-yellow-700">📇 ' + n + '</span>';
  return '<span>📇 ' + n + '</span>';
}

function userRow(u) {
  const checked = selectedUserIds.has(u.id) ? 'checked' : '';
  return `
    <div data-user-row="${u.id}" class="flex items-center gap-3 px-4 py-3 border-b border-slate-100 hover:bg-slate-50">
      <input type="checkbox" data-select-user="${u.id}" ${checked}

      <div data-user-id="${u.id}" class="flex items-center gap-3 flex-1 min-w-0 cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-[#1F4E79] text-white flex items-center justify-center font-bold text-lg flex-shrink-0">
          ${(u.display_name || '?').charAt(0).toUpperCase()}

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <div class="font-semibold truncate">${u.display_name || '(isimsiz)'}</div>

function updateBulkToolbar() {
  const bar = document.getElementById('bulk-toolbar');
  if (!bar) return;
  const count = selectedUserIds.size;
  if (count > 0) {
    bar.classList.remove('hidden');
    bar.classList.add('flex');
    document.getElementById('selected-count').textContent = count;
  } else {
    bar.classList.add('hidden');
    bar.classList.remove('flex');

function toggleUserSelection(userId) {
  if (selectedUserIds.has(userId)) selectedUserIds.delete(userId);

async function sendBroadcast() {
  const title = document.getElementById('bc-title').value.trim();
  const body = document.getElementById('bc-body').value.trim();
  if (!title || !body) {
    alert('Başlık ve mesaj zorunlu.');
    return;
  }
  const btn = document.getElementById('send-broadcast-btn');
  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';
  try {
    const userIds = Array.from(selectedUserIds);
    const result = await apiJson('/admin/broadcast', {
      method: 'POST',
      body: JSON.stringify({ userIds, title, body }),
    });
    closeModal();
    selectedUserIds.clear();
    updateBulkToolbar();
    loadUsers();
    alert('✓ ' + (result?.sent ?? 0) + ' kullanıcıya gönderildi.');
  } catch (err) {
    alert('Hata: ' + err.message);
    btn.disabled = false;
    btn.textContent = '📨 Gönder';
  }
}

  { hours: 24, label: '1 gün' },
  { hours: 24 * 3, label: '3 gün' },
  { hours: 24 * 7, label: '7 gün' },
  { hours: 24 * 30, label: '30 gün' },
  { hours: null, label: 'Süresiz' },
];

function openStatusDialog(userId, status, name) {
  const labels = { active: 'Aktif Yap / Geri Al', suspended: 'Askıya Al', banned: 'Kalıcı Yasakla' };
  const showDuration = status === 'suspended';
  const html = `
    <div class="p-6 border-b border-slate-200 flex items-center justify-between">
      <div>
        <div class="text-lg font-bold">${labels[status]}</div>
        <div class="text-xs text-slate-500 mt-1">${name}</div>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
    </div>
    <div class="p-6 space-y-4">
      ${showDuration ? `
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Süre</label>
        <div class="grid grid-cols-3 gap-2">
          ${SUSPEND_DURATIONS.map((d, i) => `
            <button type="button" data-dur="${d.hours === null ? '' : d.hours}"
              class="dur-btn px-3 py-2 border border-slate-300 rounded-lg text-sm ${i === 2 ? 'bg-[#1F4E79] text-white border-[#1F4E79]' : 'bg-white'}">
              ${d.label}
            </button>`).join('')}
        </div>
      </div>` : ''}
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          Gerekçe <span class="text-red-600">*</span>
        </label>
        <textarea id="status-reason" rows="3" required minlength="3" maxlength="500"
          placeholder="${status === 'active' ? 'Neden geri alıyorsun?' : 'Hangi kural ihlali? Neden bu aksiyon?'}"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#1F4E79] resize-none"></textarea>
        <div class="text-xs text-slate-500 mt-1">En az 3 karakter. Audit log'da kalıcı kayıt.</div>
      </div>
      <div id="status-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
    </div>
    <div class="p-6 border-t border-slate-200 flex gap-2">
      <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-lg bg-slate-100 text-slate-700 font-semibold hover:bg-slate-200">Vazgeç</button>
      <button onclick="submitStatusChange('${userId}', '${status}')"
        class="flex-1 px-4 py-3 rounded-lg ${status === 'banned' ? 'bg-red-600 hover:bg-red-700' : status === 'suspended' ? 'bg-yellow-600 hover:bg-yellow-700' : 'bg-green-600 hover:bg-green-700'} text-white font-semibold">
        Uygula
      </button>
    </div>
  `;
  openModal(html);
  // Duration button state (mevcut default: index 2 = 7 gün)
  if (showDuration) {
    let selectedDur = 24 * 7;
    window._selectedDuration = selectedDur;
    document.querySelectorAll('.dur-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.dur-btn').forEach(x => x.classList.remove('bg-[#1F4E79]', 'text-white', 'border-[#1F4E79]'));
        b.classList.add('bg-[#1F4E79]', 'text-white', 'border-[#1F4E79]');
        const raw = b.dataset.dur;
        window._selectedDuration = raw === '' ? null : parseInt(raw, 10);
      });
    });
  }
}

async function submitStatusChange(userId, status) {
  const reason = document.getElementById('status-reason').value.trim();
  const err = document.getElementById('status-error');
  err.classList.add('hidden');
  if (reason.length < 3) {
    err.textContent = 'Gerekçe en az 3 karakter olmalı.';
    err.classList.remove('hidden');
    return;
  }
  const body = { status, reason };
  if (status === 'suspended') {
    body.duration_hours = window._selectedDuration;
  }
  try {
    await apiJson('/admin/users/' + userId + '/status', {
      method: 'POST',
      body: JSON.stringify(body),
    });
    closeModal();
    loadUsers();
    if (currentTab === 'dashboard') renderDashboard();
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
  }
}

function openNoteDialog(userId, name) {
  const html = `

async function submitNote(userId) {
  const note = document.getElementById('note-text').value.trim();
  const err = document.getElementById('note-error');

  if (note.length < 3) {
    err.textContent = 'Not en az 3 karakter olmalı.';
    err.classList.remove('hidden');

  try {

let listingsState = { q: '', status: 'all', category: '', city: '' };
let currentListings = [];

const LISTING_STATUS_FILTERS = [
  { key: 'all', label: 'Tümü' },
  { key: 'active', label: 'Aktif' },
  { key: 'featured', label: '⭐ Öne Çıkan' },
  { key: 'removed', label: '🗑️ Kaldırılmış' },
  { key: 'sold', label: '✓ Satıldı' },
];

function renderListings() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="mb-3 flex flex-wrap gap-3 items-center">
      <input id="listing-search" placeholder="Başlık veya açıklama..."
        value="${listingsState.q.replace(/"/g, '&quot;')}"
        class="flex-1 min-w-[240px] px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#1F4E79]" />
      <input id="listing-city" placeholder="Şehir..." value="${listingsState.city.replace(/"/g, '&quot;')}"
        class="w-40 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#1F4E79]" />
    </div>
    <div class="mb-4 flex gap-1 flex-wrap">
      ${LISTING_STATUS_FILTERS.map(f => `
        <button data-lstatus="${f.key}" class="lstat-chip px-3 py-2 text-sm rounded-lg border ${listingsState.status === f.key ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-300'}">
          ${f.label}
        </button>`).join('')}
    </div>
    <div id="listings-list" class="grid grid-cols-2 gap-3">
      <div class="col-span-2 p-16 flex justify-center"><div class="spinner"></div></div>
    </div>
  `;

  let debounceT;
  document.getElementById('listing-search').addEventListener('input', (e) => {
    clearTimeout(debounceT);
    debounceT = setTimeout(() => { listingsState.q = e.target.value.trim(); loadListings(); }, 300);
  });
  document.getElementById('listing-city').addEventListener('input', (e) => {
    clearTimeout(debounceT);
    debounceT = setTimeout(() => { listingsState.city = e.target.value.trim(); loadListings(); }, 300);
  });
  document.querySelectorAll('.lstat-chip').forEach(b => {
    b.addEventListener('click', () => {
      listingsState.status = b.dataset.lstatus;
      renderListings();
    });
  });
  loadListings();
}

async function loadListings() {
  const list = document.getElementById('listings-list');
  try {
    const params = new URLSearchParams({ limit: '60' });
    if (listingsState.q) params.set('q', listingsState.q);
    if (listingsState.city) params.set('city', listingsState.city);
    if (listingsState.status !== 'all') params.set('status', listingsState.status);
    const data = await apiJson('/admin/listings?' + params.toString());
    const rows = data?.listings || [];
    currentListings = rows;
    if (rows.length === 0) {
      list.innerHTML = '<div class="col-span-2 p-12 text-center text-slate-400">Sonuç yok</div>';
      return;
    }
    list.innerHTML = rows.map(l => listingCard(l)).join('');
    list.querySelectorAll('[data-listing-id]').forEach(el => {
      el.addEventListener('click', () => openListingDetail(el.dataset.listingId));
    });
  } catch (err) {
    list.innerHTML = '<div class="col-span-2 p-6 text-red-600">Hata: ' + err.message + '</div>';
  }
}

function listingCard(l) {
  const isRemoved = !!l.admin_removed_at;
  const isFeatured = l.featured_until && new Date(l.featured_until) > new Date();
  const cover = l.cover_photo || '';
  return `
    <div data-listing-id="${l.id}" class="bg-white border ${isRemoved ? 'border-red-300 bg-red-50' : isFeatured ? 'border-amber-300' : 'border-slate-200'} rounded-xl overflow-hidden cursor-pointer hover:shadow-md transition-shadow">
      <div class="aspect-square bg-slate-100 relative overflow-hidden">
        ${cover ? `<img src="${cover}" class="w-full h-full object-cover" />` : '<div class="w-full h-full flex items-center justify-center text-4xl text-slate-300">📦</div>'}
        ${isFeatured ? '<div class="absolute top-2 left-2 bg-amber-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">⭐ ÖNE ÇIKAN</div>' : ''}
        ${isRemoved ? '<div class="absolute inset-0 bg-red-500/40 flex items-center justify-center"><span class="bg-red-600 text-white text-xs px-3 py-1 rounded font-bold">KALDIRILDI</span></div>' : ''}
        ${l.reports_count > 0 ? '<div class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-0.5 rounded-full font-bold">⚠️ ' + l.reports_count + '</div>' : ''}
      </div>
      <div class="p-3">
        <div class="font-semibold text-sm truncate">${l.title}</div>
        <div class="text-lg font-bold text-[#1F4E79] mt-1">${Number(l.price).toLocaleString('tr-TR')} ₺</div>
        <div class="text-xs text-slate-500 truncate mt-1">
          👤 ${l.seller_name || '?'}
          ${l.location_city ? ' · 📍 ' + l.location_city : ''}
        </div>
        <div class="text-xs text-slate-400 mt-0.5">
          ${l.category_name || '(kategori yok)'} · ${formatDateShort(l.created_at)}
        </div>
      </div>
    </div>
  `;
}

async function openListingDetail(listingId) {
  openModal('<div class="p-16 flex justify-center"><div class="spinner"></div></div>');
  try {
    const data = await apiJson('/admin/listings/' + listingId);
    renderListingDetail(data);
  } catch (err) {
    openModal('<div class="p-6 text-red-600">Hata: ' + err.message + '</div>');
  }
}

    ${photos.length > 0 ? `
    <div class="p-6 border-b border-slate-200">
      <div class="grid grid-cols-4 gap-2">
        ${photos.slice(0, 8).map(p => `<img src="${p.thumb_url || p.url}" class="aspect-square object-cover rounded-lg border border-slate-200" />`).join('')}
      </div>
      ${photos.length > 8 ? `<div class="text-xs text-slate-500 mt-2">+${photos.length - 8} foto daha</div>` : ''}
    </div>` : ''}

    <div class="p-6 border-b border-slate-200">

      <div><span class="text-slate-500">Güncelleme:</span> <b>${new Date(l.updated_at).toLocaleString('tr-TR')}</b></div>
      <div class="col-span-2 flex items-center gap-2">
        <span class="text-slate-500">Satıcı:</span>
        <button onclick="closeModal(); openUserDetail('${l.user_id}')" class="text-[#1F4E79] font-semibold hover:underline">
          ${l.seller_name || '(isimsiz)'}
        </button>
        ${l.seller_status !== 'active' ? `<span class="text-xs text-red-600 font-semibold">(${l.seller_status})</span>` : ''}
      </div>

async function submitListingAction(listingId, action) {
  const reason = document.getElementById('listing-reason').value.trim();
  const err = document.getElementById('listing-error');

  if (reason.length < 3) {
    err.textContent = 'Gerekçe en az 3 karakter olmalı.';
    err.classList.remove('hidden');
    return;
  }
  try {
    await apiJson('/admin/listings/' + listingId + '/action', {
      method: 'POST',
      body: JSON.stringify({ action, reason }),
    });
    closeModal();
    loadListings();
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
  }
}

async function submitFeature(listingId) {
  const reason = document.getElementById('feature-reason').value.trim();
  const err = document.getElementById('feature-error');
  err.classList.add('hidden');
  if (reason.length < 3) {
    err.textContent = 'Gerekçe en az 3 karakter olmalı.';
    err.classList.remove('hidden');
    return;
  }
  try {
    await apiJson('/admin/listings/' + listingId + '/action', {
      method: 'POST',
      body: JSON.stringify({ action: 'feature', reason, feature_hours: window._featureHours || 168 }),
    });
    closeModal();
    loadListings();
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
  }
}

async function listingAction(listingId, action, reason) {
  try {
    await apiJson('/admin/listings/' + listingId + '/action', {
      method: 'POST',
      body: JSON.stringify({ action, reason }),
    });
    closeModal();
    loadListings();
  } catch (err) {
    alert('Hata: ' + err.message);
  }
}

// ═══════════════════════════════════════════════════════════════
// Yasak Kelimeler
// ═══════════════════════════════════════════════════════════════

function renderBanned() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2">
        <div class="text-sm text-slate-500 italic mb-2">İlanların başlık ve açıklamalarında bu kelimeler tespit edilirse otomatik reddedilir. Kullanıcı sebep mesajını görür.</div>
        <div id="banned-list" class="space-y-2">
          <div class="p-12 flex justify-center"><div class="spinner"></div></div>
        </div>
      </div>
      <div>
        <div class="bg-white rounded-xl border border-slate-200 p-4 sticky top-4">
          <div class="font-bold mb-3">➕ Yeni Yasak Kelime</div>
          <form id="banned-form" class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1">Kelime / Regex</label>
              <input id="bw-pattern" required maxlength="200"
                placeholder="whatsapp, iban:, para gönder..."
                class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-[#1F4E79]" />
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" id="bw-regex" class="w-4 h-4" />
              <label for="bw-regex" class="text-xs">Regex olarak yorumla</label>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1">Kategori</label>
              <select id="bw-category" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                <option value="">— Genel —</option>
                <option value="iletisim">📞 İletişim (whatsapp, tel, iban)</option>
                <option value="yasadisi">🚫 Yasadışı (silah, uyuşturucu)</option>
                <option value="dolandiricilik">🎣 Dolandırıcılık</option>
                <option value="spam">📢 Spam</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1">Kullanıcıya Mesaj (opsiyonel)</label>
              <textarea id="bw-message" rows="2" maxlength="200"
                placeholder="Boş bırakılırsa kategori'nin default mesajı gösterilir"
                class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm resize-none focus:outline-none focus:border-[#1F4E79]"></textarea>
            </div>
            <div id="bw-error" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded p-2"></div>
            <button type="submit" class="w-full bg-[#1F4E79] hover:bg-[#183a5c] text-white text-sm font-semibold py-2 rounded-lg">
              ➕ Ekle
            </button>
          </form>
        </div>
      </div>
    </div>
  `;
  document.getElementById('banned-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pattern = document.getElementById('bw-pattern').value.trim();
    const is_regex = document.getElementById('bw-regex').checked;
    const category = document.getElementById('bw-category').value;
    const message = document.getElementById('bw-message').value.trim();
    const err = document.getElementById('bw-error');
    err.classList.add('hidden');
    try {
      await apiJson('/admin/banned-words', {
        method: 'POST',
        body: JSON.stringify({ pattern, is_regex, category, message }),
      });
      document.getElementById('banned-form').reset();
      loadBanned();
    } catch (e) {
      err.textContent = e.message;
      err.classList.remove('hidden');
    }
  });
  loadBanned();
}

async function loadBanned() {
  const list = document.getElementById('banned-list');
  try {
    const data = await apiJson('/admin/banned-words');
    const words = data?.words || [];
    if (words.length === 0) {
      list.innerHTML = '<div class="bg-white rounded-xl border border-slate-200 p-12 text-center text-slate-400">Henüz yasak kelime eklenmemiş</div>';
      return;
    }
    list.innerHTML = words.map(w => bannedRow(w)).join('');
    list.querySelectorAll('[data-bw-del]').forEach(el => {
      el.addEventListener('click', () => deleteBanned(el.dataset.bwDel));
    });
  } catch (err) {
    list.innerHTML = '<div class="bg-red-50 border border-red-200 p-4 rounded-lg text-red-600">Hata: ' + err.message + '</div>';
  }
}

function bannedRow(w) {
  const catBadges = {
    iletisim: 'bg-blue-100 text-blue-800',
    yasadisi: 'bg-red-100 text-red-800',
    dolandiricilik: 'bg-purple-100 text-purple-800',
    spam: 'bg-slate-100 text-slate-700',
  };
  const catBadge = w.category ? `<span class="text-xs px-2 py-0.5 rounded-full font-semibold ${catBadges[w.category] || 'bg-slate-100 text-slate-700'}">${w.category}</span>` : '';
  return `
    <div class="bg-white border border-slate-200 rounded-lg p-3 flex items-center gap-3">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <code class="font-mono text-sm bg-slate-100 px-2 py-0.5 rounded">${w.pattern}</code>
          ${w.is_regex ? '<span class="text-xs bg-purple-100 text-purple-800 px-2 py-0.5 rounded-full font-semibold">regex</span>' : ''}
          ${catBadge}
        </div>
        ${w.message ? '<div class="text-xs text-slate-600 mt-1 italic">"' + w.message + '"</div>' : ''}
        <div class="text-xs text-slate-400 mt-1">${w.added_by_name || 'Sistem'} · ${new Date(w.created_at).toLocaleDateString('tr-TR')}</div>
      </div>
      <button data-bw-del="${w.id}" class="text-red-600 hover:bg-red-50 p-2 rounded">🗑️</button>
    </div>
  `;
}

async function deleteBanned(id) {
  if (!confirm('Bu yasak kelimeyi kaldır?')) return;
  try {
    await apiJson('/admin/banned-words/' + id, { method: 'DELETE' });
    loadBanned();
  } catch (e) {
    alert('Hata: ' + e.message);
  }
}

// ═══════════════════════════════════════════════════════════════
// Şikayetler
// ═══════════════════════════════════════════════════════════════

let reportsState = { status: 'pending' };

function reportsView() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="mb-4 flex gap-1">
      ${['pending', 'action_taken', 'dismissed'].map(s => `
        <button data-report-status="${s}" class="report-tab px-4 py-2 text-sm rounded-lg border ${reportsState.status === s ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-300'}">
          ${ ({pending: 'Bekleyen', action_taken: 'Aksiyon Alındı', dismissed: 'Reddedildi'})[s] }
        </button>`).join('')}
    </div>
    <div id="reports-list" class="space-y-3">
      <div class="p-16 flex justify-center"><div class="spinner"></div></div>
    </div>
  `;
  document.querySelectorAll('.report-tab').forEach(b => {
    b.addEventListener('click', () => {
      reportsState.status = b.dataset.reportStatus;
      reportsView();
    });
  });
  loadReports();
}

async function loadReports() {
  const list = document.getElementById('reports-list');
  try {
    const data = await apiJson('/admin/reports?status=' + reportsState.status);
    const reports = data?.reports || [];
    if (reports.length === 0) {
      list.innerHTML = '<div class="bg-white rounded-xl border border-slate-200 p-12 text-center"><div class="text-4xl mb-2">✅</div><div class="text-slate-500">Bu durumda şikayet yok</div></div>';
      return;
    }
    list.innerHTML = reports.map(r => reportCard(r)).join('');
    list.querySelectorAll('[data-report-id]').forEach(el => {
      el.addEventListener('click', () => openReportDetail(el.dataset.reportId));
    });
  } catch (err) {
    list.innerHTML = '<div class="text-red-600 bg-red-50 p-4 rounded-lg">Hata: ' + err.message + '</div>';
  }
}

function reportCard(r) {
  const typeIcon = r.target_type === 'listing' ? '📦' : r.target_type === 'message' ? '💬' : '👤';
  const typeLabel = r.target_type === 'listing' ? 'İlan' : r.target_type === 'message' ? 'Mesaj' : 'Kullanıcı';
  return `
    <div data-report-id="${r.id}" class="card cursor-pointer hover:bg-slate-50">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-xl">${typeIcon}</div>
        <div class="flex-1">
          <div class="font-bold">${typeLabel} şikayeti</div>
          <div class="text-xs text-slate-500">${new Date(r.created_at).toLocaleString('tr-TR')}</div>
        </div>
      </div>
      <div class="text-sm text-slate-700 line-clamp-2">💬 ${r.reason}</div>
      <div class="text-xs text-slate-500 mt-2">📩 ${r.reporter_name || 'Bilinmiyor'}</div>
    </div>`;
}

async function openReportDetail(reportId) {
  openModal('<div class="p-16 flex justify-center"><div class="spinner"></div></div>');
  try {
    const data = await apiJson('/admin/reports/' + reportId);
    renderReportDetailModal(data);
  } catch (err) {
    openModal('<div class="p-6 text-red-600">Hata: ' + err.message + '</div>');
  }
}

function renderReportDetailModal(data) {
  const r = data.report || data;
  const target = data.target || {};
  const html = `
    <div class="p-6 border-b border-slate-200 flex items-start justify-between">
      <div>
        <div class="text-lg font-bold">Şikayet Detayı</div>
        <div class="text-xs text-slate-500 mt-1">${new Date(r.created_at).toLocaleString('tr-TR')}</div>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
    </div>
    <div class="p-6 space-y-3 text-sm">
      <div><span class="text-slate-500">Hedef Tipi:</span> <b>${r.target_type}</b></div>
      <div><span class="text-slate-500">Hedef ID:</span> <span class="font-mono text-xs select-all">${r.target_id}</span></div>
      <div><span class="text-slate-500">Şikayet:</span> <div class="mt-1 p-3 bg-yellow-50 rounded-lg border border-yellow-200">💬 ${r.reason}</div></div>
      ${r.detail ? `<div><span class="text-slate-500">Detay:</span> <div class="mt-1 p-3 bg-slate-50 rounded-lg">${r.detail}</div></div>` : ''}
      ${r.reporter_name ? `<div><span class="text-slate-500">Şikayet eden:</span> <b>${r.reporter_name}</b></div>` : ''}
      ${target.title ? `<div><span class="text-slate-500">İlan başlığı:</span> <b>${target.title}</b></div>` : ''}
      ${target.display_name ? `<div><span class="text-slate-500">Hedef kullanıcı:</span> <b>${target.display_name}</b></div>` : ''}
      <div><span class="text-slate-500">Durum:</span> <b>${r.status}</b></div>
      ${r.reviewer_notes ? `<div><span class="text-slate-500">Not:</span> <div class="mt-1 italic text-green-700">${r.reviewer_notes}</div></div>` : ''}
    </div>
    ${r.status === 'pending' ? `
    <div class="p-6 border-t border-slate-200 space-y-2">
      <button onclick="reportAction('${r.id}', 'delete_content')" class="w-full px-4 py-3 rounded-lg bg-red-100 text-red-800 font-semibold hover:bg-red-200">🗑️ İçeriği Sil</button>
      <button onclick="reportAction('${r.id}', 'suspend_user')" class="w-full px-4 py-3 rounded-lg bg-yellow-100 text-yellow-800 font-semibold hover:bg-yellow-200">⏸️ Kullanıcıyı Askıya Al</button>
      <button onclick="reportAction('${r.id}', 'dismiss')" class="w-full px-4 py-3 rounded-lg bg-slate-100 text-slate-700 font-semibold hover:bg-slate-200">✖️ Şikayeti Reddet</button>
    </div>` : ''}
  `;
  document.getElementById('modal-content').innerHTML = html;
}

async function reportAction(reportId, action) {
  const notes = prompt('Not (opsiyonel):') || '';
  try {
    await apiJson('/admin/reports/' + reportId + '/action', {
      method: 'POST',
      body: JSON.stringify({ action, reviewer_notes: notes }),
    });
    closeModal();
    loadReports();
    if (currentTab === 'dashboard') renderDashboard();
  } catch (err) {
    alert('Hata: ' + err.message);
  }
}

// ═══════════════════════════════════════════════════════════════
// Modal
// ═══════════════════════════════════════════════════════════════

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ═══════════════════════════════════════════════════════════════
// Wrappers (single call site helpers)
// ═══════════════════════════════════════════════════════════════

function renderDashboard_() { return renderDashboard(); }
function renderUsers() { return usersView(); }
function renderReports() { return reportsView(); }

// ═══════════════════════════════════════════════════════════════
// Init & Event Listeners
// ═══════════════════════════════════════════════════════════════

document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => switchTab(b.dataset.tab));
});

document.getElementById('logout-btn').addEventListener('click', logout);

document.getElementById('refresh-btn').addEventListener('click', () => {
  switchTab(currentTab);
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('login-error');
  err.classList.add('hidden');
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Giriş yapılıyor...';
  try {
    const phone = document.getElementById('phone').value;
    const pin = document.getElementById('pin').value;
    const totp = document.getElementById('totp').value.replace(/\s+/g, '');
    await doLogin(phone, pin, totp);
    showMain();
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
  }
});

// Otomatik refresh — her 30 saniyede bir dashboard
setInterval(() => {
  if (currentTab === 'dashboard' && !document.getElementById('main-view').classList.contains('hidden')) {
    renderDashboard();
  }
}, 30_000);

// Boot: token varsa direkt panel'e gir
(async function boot() {
  const access = localStorage.getItem(LS_ACCESS);
  if (!access) {
    showLogin();
    return;
  }
  try {
    const me = await apiJson('/users/me');
    if (!me?.user?.is_admin) {
      logout();
      return;
    }
    localStorage.setItem(LS_USER, JSON.stringify(me.user));
    showMain();
  } catch {
    logout();
  }
})();
</script>
